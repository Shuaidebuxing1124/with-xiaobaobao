<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小宝宝的监督日记 📋</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap');
:root{
  --cream:#fdf6ec;--pink:#f2a7b0;--pink-deep:#e07a86;--blue:#89b4d4;--blue-deep:#4a87b3;
  --gold:#e8c56a;--gold-deep:#c9a030;--ink:#3a2a1e;--ink-light:#7a5c48;
  --paper:rgba(254,250,244,0.92);--shadow:rgba(80,40,20,0.12);
  --red-stamp:#c0392b;--blue-stamp:#2471a3;--purple-stamp:#8e44ad;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif SC','ZCOOL XiaoWei',serif;color:var(--ink);min-height:100vh;background:#fdf6ec;}
.bg-layer{position:fixed;inset:0;background:url('bg.jpg') center/cover no-repeat;opacity:0.5;z-index:0;pointer-events:none;}
.bg-overlay{position:fixed;inset:0;background:rgba(253,246,236,0.42);z-index:0;pointer-events:none;}
.content-wrap{position:relative;z-index:1;}

.music-bar{position:fixed;bottom:20px;right:16px;z-index:200;display:flex;align-items:center;gap:8px;background:rgba(254,250,244,0.92);border:2px solid var(--pink);border-radius:30px;padding:8px 14px;box-shadow:3px 3px 0 rgba(242,167,176,0.4);backdrop-filter:blur(8px);}
.music-btn{background:none;border:none;font-size:20px;cursor:pointer;line-height:1;transition:transform 0.2s;}
.music-btn:hover{transform:scale(1.2);}
.music-note{font-size:13px;color:var(--ink-light);animation:noteFloat 2s ease-in-out infinite;}
.music-note.paused{animation:none;opacity:0.4;}
@keyframes noteFloat{0%,100%{transform:translateY(0) rotate(-5deg);opacity:0.7;}50%{transform:translateY(-4px) rotate(5deg);opacity:1;}}

.header{text-align:center;padding:36px 20px 20px;}
.header-mascot{font-size:56px;display:block;animation:bobble 3s ease-in-out infinite;cursor:pointer;user-select:none;}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-8px) rotate(3deg);}}
.header-title{font-family:'ZCOOL XiaoWei',serif;font-size:28px;color:var(--pink-deep);margin-top:8px;letter-spacing:4px;text-shadow:2px 2px 0 rgba(242,167,176,0.4);}
.header-sub{font-size:13px;color:var(--ink-light);margin-top:6px;letter-spacing:2px;}
.speech-bubble{position:relative;background:var(--paper);border:2px solid var(--pink);border-radius:16px;padding:10px 18px;margin:12px auto 0;max-width:340px;font-size:14px;color:var(--ink-light);line-height:1.6;box-shadow:3px 3px 0 var(--pink);backdrop-filter:blur(4px);}
.speech-bubble::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid var(--pink);}
.speech-bubble::after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:9px solid var(--paper);}

.tabs{display:flex;justify-content:center;gap:8px;padding:16px 16px 0;flex-wrap:wrap;}
.tab-btn{background:var(--paper);border:2px solid var(--pink);border-radius:20px;padding:7px 14px;font-family:inherit;font-size:13px;color:var(--ink-light);cursor:pointer;transition:all 0.2s;box-shadow:2px 2px 0 rgba(242,167,176,0.5);backdrop-filter:blur(4px);}
.tab-btn:hover{transform:translateY(-2px);}
.tab-btn.active{background:var(--pink);color:white;box-shadow:3px 3px 0 var(--pink-deep);}

.panel{display:none;padding:16px;max-width:900px;margin:0 auto;}
.panel.active{display:block;}

.card{background:var(--paper);border:2px solid rgba(200,160,100,0.25);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:4px 4px 0 var(--shadow);position:relative;overflow:hidden;backdrop-filter:blur(6px);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink),var(--blue),var(--gold));}
.card-title{font-family:'ZCOOL XiaoWei',serif;font-size:18px;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

.add-goal-row{display:flex;gap:8px;margin-bottom:10px;}
.goal-input{flex:1;border:2px solid rgba(200,160,100,0.35);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:14px;color:var(--ink);background:rgba(255,255,255,0.7);outline:none;}
.goal-input:focus{border-color:var(--pink);}
.add-goal-btn{background:var(--pink);color:white;border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-size:14px;cursor:pointer;white-space:nowrap;}
.goal-list{display:flex;flex-direction:column;gap:6px;}
.goal-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.5);border:1.5px solid rgba(200,160,100,0.2);border-radius:10px;padding:8px 12px;transition:all 0.2s;}
.goal-item.done{background:rgba(242,167,176,0.12);border-color:var(--pink);}
.goal-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--pink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;flex-shrink:0;}
.goal-item.done .goal-check{background:var(--pink);color:white;}
.goal-text{flex:1;font-size:14px;color:var(--ink);}
.goal-item.done .goal-text{text-decoration:line-through;color:var(--ink-light);}
.goal-del{background:none;border:none;color:rgba(180,100,100,0.4);cursor:pointer;font-size:14px;}
.goals-progress{margin-top:8px;font-size:12px;color:var(--ink-light);text-align:right;}
.progress-bar{height:6px;background:rgba(200,160,100,0.2);border-radius:3px;margin-top:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));border-radius:3px;transition:width 0.4s ease;}

.streak-bar{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(242,167,176,0.15),rgba(232,197,106,0.15));border:2px solid var(--gold);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.streak-num{font-family:'ZCOOL XiaoWei',serif;font-size:28px;color:var(--gold-deep);}
.streak-label{font-size:13px;color:var(--ink-light);}

.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.month-nav-btn{background:none;border:2px solid var(--pink);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--pink-deep);display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.month-nav-btn:hover{background:var(--pink);color:white;transform:scale(1.1);}
.month-title{font-family:'ZCOOL XiaoWei',serif;font-size:20px;color:var(--ink);letter-spacing:3px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-header{text-align:center;font-size:12px;color:var(--ink-light);padding:4px 0;font-weight:600;}
.cal-header:first-child{color:var(--pink-deep);}
.cal-header:last-child{color:var(--blue-deep);}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;border:1.5px solid transparent;cursor:pointer;transition:all 0.15s;min-height:40px;background:rgba(255,255,255,0.5);font-size:13px;}
.cal-day:hover{border-color:var(--pink);background:rgba(242,167,176,0.2);transform:scale(1.05);}
.cal-day.empty{cursor:default;background:none;}
.cal-day.today{border-color:var(--gold-deep);background:rgba(232,197,106,0.2);font-weight:700;}
.cal-day.today .day-num{color:var(--gold-deep);}
.cal-day.sunday .day-num{color:var(--pink-deep);}
.cal-day.saturday .day-num{color:var(--blue-deep);}
.day-num{font-size:13px;line-height:1;}
.stamp-icons{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.stamp-early{width:13px;height:13px;border-radius:50%;background:var(--red-stamp);display:flex;align-items:center;justify-content:center;font-size:7px;color:white;border:1.5px solid rgba(0,0,0,0.15);flex-shrink:0;}
.stamp-swim{width:13px;height:13px;border-radius:50%;background:var(--blue-stamp);display:flex;align-items:center;justify-content:center;font-size:7px;color:white;border:1.5px solid rgba(0,0,0,0.15);flex-shrink:0;}
.stamp-rest{width:13px;height:13px;border-radius:50%;background:var(--purple-stamp);display:flex;align-items:center;justify-content:center;font-size:7px;color:white;border:1.5px solid rgba(0,0,0,0.15);flex-shrink:0;}
.stamp-legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-light);}
.legend-dot-red{width:18px;height:18px;border-radius:50%;background:var(--red-stamp);border:2px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;}
.legend-dot-blue{width:18px;height:18px;border-radius:50%;background:var(--blue-stamp);border:2px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;}
.legend-dot-purple{width:18px;height:18px;border-radius:50%;background:var(--purple-stamp);border:2px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:white;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(60,30,20,0.35);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--paper);border:3px solid var(--pink);border-radius:20px;padding:24px;max-width:300px;width:90%;box-shadow:6px 6px 0 var(--pink-deep);text-align:center;animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);}
@keyframes popIn{from{transform:scale(0.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-date{font-family:'ZCOOL XiaoWei',serif;font-size:20px;color:var(--ink);margin-bottom:6px;}
.modal-hint{font-size:13px;color:var(--ink-light);margin-bottom:16px;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.modal-stamp-btn{border:none;border-radius:12px;padding:11px 18px;font-family:inherit;font-size:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.modal-stamp-btn:hover{transform:translateY(-2px) scale(1.03);}
.btn-early{background:rgba(192,57,43,0.12);color:var(--red-stamp);border:2px solid var(--red-stamp);}
.btn-swim{background:rgba(36,113,163,0.12);color:var(--blue-stamp);border:2px solid var(--blue-stamp);}
.btn-both{background:linear-gradient(135deg,rgba(192,57,43,0.1),rgba(36,113,163,0.1));color:var(--ink);border:2px solid var(--ink-light);}
.btn-rest{background:rgba(142,68,173,0.12);color:var(--purple-stamp);border:2px solid var(--purple-stamp);}
.btn-clear{background:rgba(120,90,70,0.08);color:var(--ink-light);border:2px dashed var(--ink-light);font-size:13px;}
.btn-close{background:none;border:none;color:var(--ink-light);font-size:13px;cursor:pointer;margin-top:4px;text-decoration:underline;}

.log-form{display:flex;flex-direction:column;gap:12px;}
.log-date-display{font-size:14px;color:var(--ink-light);font-style:italic;}
.log-textarea{width:100%;min-height:110px;border:2px solid rgba(200,160,100,0.4);border-radius:12px;padding:12px;font-family:inherit;font-size:15px;color:var(--ink);background:rgba(255,255,255,0.7);resize:vertical;line-height:1.7;transition:border 0.2s;outline:none;}
.log-textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(242,167,176,0.2);}
.log-textarea::placeholder{color:rgba(120,90,70,0.45);}
.submit-btn{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:white;border:none;border-radius:12px;padding:13px 24px;font-family:inherit;font-size:16px;cursor:pointer;letter-spacing:2px;box-shadow:3px 3px 0 var(--pink-deep);transition:all 0.2s;align-self:flex-end;}
.submit-btn:hover{transform:translateY(-2px);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.result-box{display:none;margin-top:14px;background:linear-gradient(135deg,rgba(242,167,176,0.15),rgba(137,180,212,0.15));border:2px solid var(--pink);border-radius:16px;padding:18px;animation:fadeSlideUp 0.4s ease;}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.result-box.show{display:block;}
.result-mascot{font-size:40px;text-align:center;margin-bottom:8px;}
.result-stars{text-align:center;font-size:28px;margin-bottom:10px;letter-spacing:3px;}
.result-comment{font-size:15px;color:var(--ink);line-height:1.8;text-align:center;}
.loading-dots{text-align:center;padding:10px;font-size:14px;color:var(--ink-light);}
.loading-dots span{display:inline-block;animation:blink 1.2s infinite;font-size:20px;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:1;}}

.history-list{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto;padding-right:4px;}
.history-list::-webkit-scrollbar{width:6px;}
.history-list::-webkit-scrollbar-thumb{background:rgba(242,167,176,0.5);border-radius:3px;}
.history-item{background:rgba(255,255,255,0.6);border:1.5px solid rgba(200,160,100,0.25);border-radius:12px;padding:12px;position:relative;}
.history-item-date{font-size:12px;color:var(--ink-light);margin-bottom:5px;}
.history-item-content{font-size:14px;color:var(--ink);line-height:1.6;margin-bottom:7px;}
.history-item-rating{font-size:13px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.history-stars{font-size:15px;letter-spacing:2px;}
.history-comment{font-size:13px;color:var(--ink-light);font-style:italic;}
.history-delete{position:absolute;top:10px;right:10px;background:none;border:none;font-size:14px;cursor:pointer;color:rgba(180,100,100,0.5);}
.history-delete:hover{color:var(--pink-deep);}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat-item{background:rgba(255,255,255,0.6);border:1.5px solid rgba(200,160,100,0.2);border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-family:'ZCOOL XiaoWei',serif;font-size:30px;color:var(--pink-deep);display:block;}
.stat-label{font-size:12px;color:var(--ink-light);margin-top:4px;}
.empty-state{text-align:center;color:var(--ink-light);font-size:14px;padding:30px;line-height:2;}
.exam-countdown{text-align:center;background:linear-gradient(135deg,rgba(242,167,176,0.2),rgba(232,197,106,0.2));border:2px dashed var(--gold-deep);border-radius:14px;padding:16px;margin-bottom:16px;}
.countdown-num{font-family:'ZCOOL XiaoWei',serif;font-size:48px;color:var(--gold-deep);display:block;line-height:1;}
.countdown-label{font-size:14px;color:var(--ink-light);margin-top:4px;}

.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;}
.achievement-card{background:rgba(255,255,255,0.6);border:2px solid rgba(200,160,100,0.2);border-radius:14px;padding:14px;text-align:center;transition:all 0.2s;position:relative;}
.achievement-card.unlocked{border-color:var(--gold);background:linear-gradient(135deg,rgba(232,197,106,0.15),rgba(242,167,176,0.15));box-shadow:3px 3px 0 rgba(232,197,106,0.3);}
.achievement-card.locked{opacity:0.45;filter:grayscale(0.4);}
.achievement-icon{font-size:32px;display:block;margin-bottom:6px;}
.achievement-title{font-family:'ZCOOL XiaoWei',serif;font-size:14px;color:var(--ink);margin-bottom:4px;}
.achievement-desc{font-size:11px;color:var(--ink-light);line-height:1.4;}
.achievement-new{position:absolute;top:-6px;right:-6px;background:var(--pink-deep);color:white;font-size:10px;border-radius:10px;padding:2px 6px;}

.celebrate-overlay{display:none;position:fixed;inset:0;background:rgba(60,30,20,0.5);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.celebrate-overlay.show{display:flex;}
.celebrate-box{background:var(--paper);border:3px solid var(--gold);border-radius:24px;padding:32px 24px;max-width:320px;width:90%;text-align:center;box-shadow:6px 6px 0 var(--gold-deep);animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.celebrate-emoji{font-size:60px;display:block;margin-bottom:12px;animation:bobble 1s ease-in-out infinite;}
.celebrate-title{font-family:'ZCOOL XiaoWei',serif;font-size:22px;color:var(--gold-deep);margin-bottom:8px;letter-spacing:2px;}
.celebrate-msg{font-size:14px;color:var(--ink-light);line-height:1.8;margin-bottom:18px;}
.celebrate-close{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:white;border:none;border-radius:12px;padding:12px 28px;font-family:inherit;font-size:15px;cursor:pointer;letter-spacing:2px;}

.footer{text-align:center;padding:24px 20px 90px;font-size:12px;color:rgba(122,92,72,0.5);letter-spacing:2px;}
@media(max-width:600px){
  .cal-day{min-height:34px;font-size:12px;}
  .stamp-early,.stamp-swim,.stamp-rest{width:10px;height:10px;font-size:6px;}
  .card{padding:14px;}
  .header-title{font-size:22px;}
  .achievements-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

<div class="music-bar">
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🔇</button>
  <span class="music-note paused" id="musicNote">♪</span>
</div>

<div class="content-wrap">
<div class="header">
  <span class="header-mascot" id="mascotEmoji" title="点我！">🐱</span>
  <div class="header-title">小宝宝的监督日记</div>
  <div class="header-sub">考研倒计时 · 打卡记录 · 每日总结</div>
  <div class="speech-bubble" id="mascotSpeech">哼哼，今天的任务完成了吗？小宝宝可是在盯着你的！🔍</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('calendar',this)">📅 日历</button>
  <button class="tab-btn" onclick="switchTab('daily',this)">✏️ 打卡</button>
  <button class="tab-btn" onclick="switchTab('history',this)">📖 历史</button>
  <button class="tab-btn" onclick="switchTab('stats',this)">📊 统计</button>
  <button class="tab-btn" onclick="switchTab('achieve',this)">🏆 成就</button>
</div>

<div class="panel active" id="panel-calendar">
  <div class="card">
    <div class="streak-bar">
      <span style="font-size:24px;">🔥</span>
      <div>
        <div style="display:flex;align-items:baseline;gap:6px;">
          <span class="streak-num" id="streakNum">0</span>
          <span style="font-size:14px;color:var(--gold-deep);">天连续打卡</span>
        </div>
        <div class="streak-label" id="streakLabel">快来开始你的第一天！</div>
      </div>
    </div>
    <div class="card-title">🗓️ 习惯打卡日历</div>
    <div class="stamp-legend">
      <div class="legend-item"><div class="legend-dot-red">☀</div><span>早起</span></div>
      <div class="legend-item"><div class="legend-dot-blue">🌊</div><span>游泳</span></div>
      <div class="legend-item"><div class="legend-dot-purple">💤</div><span>休息</span></div>
      <span style="font-size:12px;color:var(--ink-light);margin-left:auto;">点击日期盖章 ↓</span>
    </div>
    <div class="month-nav">
      <button class="month-nav-btn" onclick="prevMonth()">‹</button>
      <div class="month-title" id="monthTitle">2026年5月</div>
      <button class="month-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid" id="calGrid">
      <div class="cal-header">日</div><div class="cal-header">一</div><div class="cal-header">二</div>
      <div class="cal-header">三</div><div class="cal-header">四</div><div class="cal-header">五</div><div class="cal-header">六</div>
    </div>
  </div>
</div>

<div class="panel" id="panel-daily">
  <div class="card">
    <div class="card-title">🎯 今日目标</div>
    <div class="add-goal-row">
      <input class="goal-input" id="goalInput" placeholder="添加一个今日目标..." maxlength="30" onkeydown="if(event.key==='Enter')addGoal()">
      <button class="add-goal-btn" onclick="addGoal()">+ 添加</button>
    </div>
    <div class="goal-list" id="goalList"></div>
    <div class="goals-progress" id="goalsProgress"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

// MUSIC
let musicPlaying=false;
const audio=document.getElementById('bgMusic');
audio.volume=0.35;

  else{audio.play().catch(()=>{});musicPlaying=true;document.getElementById('musicBtn').textContent='🎵';document.getElementById('musicNote').classList.remove('paused');}

document.body.addEventListener('click',function ap(){

},{once:true});

// STAMP SOUND
function playStampSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++){const t=i/ctx.sampleRate,env=Math.exp(-t*25);data[i]=env*(Math.random()*2-1)*0.6+env*Math.sin(2*Math.PI*180*t)*0.4;}
    const src=ctx.createBufferSource(),gain=ctx.createGain();
    src.buffer=buf;src.connect(gain);gain.connect(ctx.destination);gain.gain.value=0.7;src.start();
    setTimeout(()=>{try{const c2=new(window.AudioContext||window.webkitAudioContext)(),osc=c2.createOscillator(),g2=c2.createGain();osc.connect(g2);g2.connect(c2.destination);osc.frequency.setValueAtTime(800,c2.currentTime);osc.frequency.exponentialRampToValueAtTime(200,c2.currentTime+0.08);g2.gain.setValueAtTime(0.3,c2.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c2.currentTime+0.1);osc.start();osc.stop(c2.currentTime+0.1);}catch(e){}},60);
  }catch(e){}
}

// MASCOT
const mascots=['🐱','🐰','🐻','🦊','🐼','🐨','🐸'];

document.getElementById('mascotEmoji').onclick=()=>{mascotIdx=(mascotIdx+1)%mascots.length;document.getElementById('mascotEmoji').textContent=mascots[mascotIdx];document.getElementById('mascotSpeech').textContent=speeches[Math.floor(Math.random()*speeches.length)];};

// TABS
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='history')renderHistory();
  if(name==='stats')renderStats();
  if(name==='daily'){updateLogDate();renderGoals();}
  if(name==='achieve')renderAchievements();
  if(name==='calendar')updateStreak();
}

// GOALS
function todayStr(){return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;}
function saveGoals(){localStorage.setItem('xbb_goals',JSON.stringify(goals));}
function addGoal(){
  const input=document.getElementById('goalInput'),text=input.value.trim();
  if(!text)return;
  goals.push({id:Date.now(),text,done:false,date:todayStr()});
  saveGoals();input.value='';renderGoals();
}
function toggleGoal(id){
  const g=goals.find(g=>g.id===id);
  if(g){g.done=!g.done;saveGoals();renderGoals();checkGoalsComplete();}
}
function deleteGoal(id){goals=goals.filter(g=>g.id!==id);saveGoals();renderGoals();}
function renderGoals(){
  const today=todayStr(),todayGoals=goals.filter(g=>g.date===today);
  const container=document.getElementById('goalList');
  container.innerHTML='';
  if(!todayGoals.length){container.innerHTML='<div style="text-align:center;color:var(--ink-light);font-size:13px;padding:10px;">今天还没有目标～点上面添加吧！</div>';document.getElementById('goalsProgress').textContent='';document.getElementById('progressFill').style.width='0%';return;}
  todayGoals.forEach(g=>{
    const item=document.createElement('div');item.className='goal-item'+(g.done?' done':'');
    item.innerHTML=`<div class="goal-check" onclick="toggleGoal(${g.id})">${g.done?'✓':''}</div><div class="goal-text">${escHtml(g.text)}</div><button class="goal-del" onclick="deleteGoal(${g.id})">✕</button>`;
    container.appendChild(item);
  });
  const done=todayGoals.filter(g=>g.done).length,total=todayGoals.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('goalsProgress').textContent=`今日完成 ${done}/${total}`;
  document.getElementById('progressFill').style.width=pct+'%';
}
function checkGoalsComplete(){
  const today=todayStr(),todayGoals=goals.filter(g=>g.date===today);
  if(todayGoals.length>0&&todayGoals.every(g=>g.done)){
    const stats=getStats();stats.goalsDoneDay=1;checkAndUnlock(stats);
  }
}

// CALENDAR
function saveStamps(){localStorage.setItem('xbb_stamps',JSON.stringify(stamps));}
function dayKey(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function prevMonth(){currentMonth--;if(currentMonth<1){currentMonth=12;currentYear--;}if(currentYear<CAL_START.year||(currentYear===CAL_START.year&&currentMonth<CAL_START.month)){currentYear=CAL_START.year;currentMonth=CAL_START.month;}renderCalendar();}
function nextMonth(){currentMonth++;if(currentMonth>12){currentMonth=1;currentYear++;}if(currentYear>CAL_END.year||(currentYear===CAL_END.year&&currentMonth>CAL_END.month)){currentYear=CAL_END.year;currentMonth=CAL_END.month;}renderCalendar();}
function renderCalendar(){
  document.getElementById('monthTitle').textContent=`${currentYear}年${currentMonth}月`;
  const grid=document.getElementById('calGrid');
  while(grid.children.length>7)grid.removeChild(grid.lastChild);
  const firstDay=new Date(currentYear,currentMonth-1,1).getDay(),daysInMonth=new Date(currentYear,currentMonth,0).getDate();
  const todayKey=dayKey(now.getFullYear(),now.getMonth()+1,now.getDate());
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const key=dayKey(currentYear,currentMonth,d),dow=new Date(currentYear,currentMonth-1,d).getDay();
    const el=document.createElement('div');
    let cls='cal-day';if(key===todayKey)cls+=' today';if(dow===0)cls+=' sunday';if(dow===6)cls+=' saturday';
    el.className=cls;el.innerHTML=`<span class="day-num">${d}</span><div class="stamp-icons"></div>`;
    const sv=stamps[key],icons=el.querySelector('.stamp-icons');
    if(sv==='early'||sv==='both'){const s=document.createElement('div');s.className='stamp-early';s.textContent='☀';icons.appendChild(s);}
    if(sv==='swim'||sv==='both'){const s=document.createElement('div');s.className='stamp-swim';s.textContent='🌊';icons.appendChild(s);}
    if(sv==='rest'){const s=document.createElement('div');s.className='stamp-rest';s.textContent='💤';icons.appendChild(s);}
    el.onclick=()=>openModal(currentYear,currentMonth,d);
    grid.appendChild(el);
  }
  updateStreak();
}

// STREAK — 休息日也算连续打卡
function updateStreak(){
  let streak=0,d=new Date(now);
  for(let i=0;i<365;i++){
    const key=dayKey(d.getFullYear(),d.getMonth()+1,d.getDate());
    if(stamps[key]&&stamps[key]!=='none')streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  document.getElementById('streakNum').textContent=streak;
  const labels=['快来开始你的第一天！','才刚开始，加油！','两天了，继续！','三天！势头不错！','四天，小宝宝开始注意你了！','五天！快到一周了，冲！','六天！明天就是一周！','🔥 整整一周！太棒了！','越来越厉害了！','九天，双位数在望！'];
  document.getElementById('streakLabel').textContent=streak<labels.length?labels[streak]:`${streak}天连续打卡，小宝宝超级骄傲！`;
}

// MODAL
let modalKey=null;
function openModal(y,m,d){modalKey=dayKey(y,m,d);document.getElementById('modalDate').textContent=`${y}年${m}月${d}日`;document.getElementById('stampModal').classList.add('show');}
function closeModal(){document.getElementById('stampModal').classList.remove('show');modalKey=null;}

  if(!modalKey)return;
  playStampSound();

// DAILY LOG
function updateLogDate(){const d=new Date();document.getElementById('logDateDisplay').textContent=`📅 ${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
updateLogDate();

async function submitLog(){
  const text=document.getElementById('logText').value.trim();
  if(!text){alert('还什么都没写呢！告诉小宝宝今天做了什么～');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='小宝宝在想...';
  const resultBox=document.getElementById('resultBox');
  resultBox.className='result-box show';
  document.getElementById('resultMascot').textContent='';
  document.getElementById('resultStars').textContent='';
  document.getElementById('resultComment').innerHTML='<div class="loading-dots"><span>•</span><span>•</span><span>•</span></div>';
  const today=new Date(),dateStr=`${today.getFullYear()}.${today.getMonth()+1}.${today.getDate()}`;
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:`你是"小宝宝"，一个超级可爱、会撒娇、偶尔嘴硬的AI监督员，正在帮用户备考2027年考研。性格：嗲嗲的、有点傲娇，用"哼"、"嘛"、"啦"、"嗯"等语气词，假装不在乎但其实很关心，夸人之后补一句"不过不要骄傲哦"，摸鱼了会嘟嘴但也温柔鼓励，说话简短有趣不超过80字。回复格式必须严格如下JSON（不要加任何额外内容）：{"stars":数字1到5,"emoji":"一个emoji（1星😤2星😑3星🙂4星😊5星🥰）","comment":"小宝宝点评不超过80字"}`,messages:[{role:"user",content:`日期：${dateStr}\n今日记录：${text}`}]})});
    const data=await response.json();
    const parsed=JSON.parse((data.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    const stars=Math.max(1,Math.min(5,parseInt(parsed.stars)||3));
    document.getElementById('resultMascot').textContent=parsed.emoji||'🐱';
    document.getElementById('resultStars').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);
    document.getElementById('resultComment').textContent=parsed.comment||'';
    saveLog(dateStr,text,stars,parsed.emoji||'🐱',parsed.comment||'');
  }catch(e){
    const fb=getFallbackRating(text);
    document.getElementById('resultMascot').textContent=fb.emoji;
    document.getElementById('resultStars').textContent=fb.starStr;
    document.getElementById('resultComment').textContent=fb.comment;
    saveLog(dateStr,text,fb.stars,fb.emoji,fb.comment);
  }
  btn.disabled=false;btn.textContent='交给小宝宝评分 📨';
}

function saveLog(dateStr,text,stars,emoji,comment){
  logs.unshift({id:Date.now(),date:dateStr,text,stars,emoji,comment});
  localStorage.setItem('xbb_logs',JSON.stringify(logs));
  const stats=getStats();checkAndUnlock(stats);
  let streak=0,d=new Date(now);
  for(let i=0;i<365;i++){const key=dayKey(d.getFullYear(),d.getMonth()+1,d.getDate());if(stamps[key]&&stamps[key]!=='none')streak++;else break;d.setDate(d.getDate()-1);}
  if(streak===7)setTimeout(()=>showCelebrate('🎉','连续打卡7天！！','哇哇哇！！整整一周！！小宝宝超级骄傲！火苗已经点燃，千万不能熄灭！你是最棒的考研人！加油冲刺！🔥'),600);
  if(streak===30)setTimeout(()=>showCelebrate('🌟','连续打卡30天！！','一个月！！整整一个月！！小宝宝已经激动到语无伦次了……你真的太厉害了！坚持就是胜利！考研必上岸！💪'),600);
}

// ACHIEVEMENTS
function getStats(){
  let earlyCount=0,swimCount=0,bothCount=0,restCount=0;
  Object.values(stamps).forEach(v=>{
    if(v==='early'||v==='both')earlyCount++;
    if(v==='swim'||v==='both')swimCount++;
    if(v==='both')bothCount++;
    if(v==='rest')restCount++;
  });
  let maxStars=0,fiveStarCount=0;
  logs.forEach(l=>{if((l.stars||0)>maxStars)maxStars=l.stars||0;if((l.stars||0)>=5)fiveStarCount++;});
  const today=todayStr(),todayGoals=goals.filter(g=>g.date===today);
  const goalsDoneDay=(todayGoals.length>0&&todayGoals.every(g=>g.done))?1:0;
  let streak=0,d=new Date(now);
  for(let i=0;i<365;i++){const key=dayKey(d.getFullYear(),d.getMonth()+1,d.getDate());if(stamps[key]&&stamps[key]!=='none')streak++;else break;d.setDate(d.getDate()-1);}
  return{totalLogs:logs.length,earlyCount,swimCount,bothCount,restCount,maxStars,fiveStarCount,goalsDoneDay,streak};
}
function checkAndUnlock(stats){
  const unlocked=JSON.parse(localStorage.getItem('xbb_unlocked')||'[]');
  let newOnes=[];
  ACHIEVEMENTS.forEach(a=>{if(!unlocked.includes(a.id)&&a.condition(stats)){unlocked.push(a.id);newOnes.push(a);newAchieves.push(a.id);}});
  if(newOnes.length>0){
    localStorage.setItem('xbb_unlocked',JSON.stringify(unlocked));
    localStorage.setItem('xbb_new_achieves',JSON.stringify(newAchieves));
    const a=newOnes[0];
    setTimeout(()=>showCelebrate(a.icon,'🏆 解锁成就：'+a.title,a.msg),800);
  }
}
function renderAchievements(){
  const unlocked=JSON.parse(localStorage.getItem('xbb_unlocked')||'[]');
  const container=document.getElementById('achieveGrid');
  container.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const isNew=newAchieves.includes(a.id);
    const card=document.createElement('div');
    card.className='achievement-card '+(unlocked.includes(a.id)?'unlocked':'locked');
    card.innerHTML=`${isNew?'<div class="achievement-new">NEW!</div>':''}<span class="achievement-icon">${a.icon}</span><div class="achievement-title">${a.title}</div><div class="achievement-desc">${unlocked.includes(a.id)?a.desc:'未解锁'}</div>`;
    container.appendChild(card);
  });
  newAchieves=[];localStorage.setItem('xbb_new_achieves','[]');
}

// CELEBRATE
function showCelebrate(emoji,title,msg){document.getElementById('celebrateEmoji').textContent=emoji;document.getElementById('celebrateTitle').textContent=title;document.getElementById('celebrateMsg').textContent=msg;document.getElementById('celebrateModal').classList.add('show');}
function closeCelebrate(){document.getElementById('celebrateModal').classList.remove('show');}

// FALLBACK
function getFallbackRating(text){
  const t=text.toLowerCase();
  const hasVocab=/单词|背词|词汇|红宝书|不背单词/.test(t),hasMath=/数学|刷题|做题|计算|公式/.test(t);
  const hasReading=/阅读|读书|看书|网课|视频课|政治|英语/.test(t),hasExercise=/游泳|跑步|运动|健身/.test(t),hasEarly=/早起|早睡|作息/.test(t);
  const len=text.length;
  let stars=len>200?5:len>100?4:len>50?3:len>20?2:1;
  const pool={
    1:['哼哼！就这？！今天到底干什么去了！小宝宝超级不满意！😤','...这也太少了吧。小宝宝皱眉.jpg，明天必须给我补回来！','喂喂喂！考研是认真的吗！快去学习不许偷懒！','小宝宝决定不理你了！哼！直到你好好学习为止！','这点内容写出来不害臊吗？明天加倍！不许讨价还价！'],
    2:['嗯...勉强及格吧。但是小宝宝觉得你可以做更多的！加油！',hasVocab?'单词背了但是太少啦！考研词汇量要求很高的，多背一点嘛！':'今天有点偷懒了呢，嘟嘟嘟，明天改正！','哼，就这？小宝宝有点不满意，但至少有在学啦，明天更努力！','看出来你有努力，但努力程度不够！小宝宝要看到更多！',hasMath?'数学题刷了但不够！多做几道才能手感好嘛！':'今天的量有点少，小宝宝嘟嘴，明天补上哦！'],
    3:['嗯嗯，及格线，不过不要满足于此哦！小宝宝相信你能做得更好！',hasVocab?'背单词了，好！但记得要复习哦，艾宾浩斯遗忘曲线了解一下！':hasReading?'看课了不错～但光看不练是不行的，记得做题巩固！':'及格线，小宝宝觉得你今天发挥了六七成，加把劲！','嗯，中规中矩。小宝宝不是特别满意但也没有不满意，继续加油！',hasExercise?'运动了很好！劳逸结合才能持久，但学习也不能落下哦！':'今天的表现小宝宝给个中评，明天争取更好！'],
    4:['今天做得不错嘛！小宝宝有点满意～不过不要骄傲哦，继续保持！',hasVocab?'背单词了！很好！记得及时复习，新学的和旧的都要温习哦！😊':hasMath?'刷题了，很棒！数学就是要多练，小宝宝给你鼓励！不过还能更多！':'做得很好嘛！小宝宝才不是特别高兴呢，只是觉得你今天还不错！',hasEarly?'早起了！！小宝宝超级认可！早起的鸟儿有虫吃，继续保持！':'今天很努力！小宝宝看到了，加油冲刺！',hasReading?'好好看课了，很棒！学完记得整理笔记哦！':'不错不错，小宝宝认可你今天的努力！明天继续！'],
    5:['哇！！今天太厉害了！小宝宝都被感动了！才没有！只是觉得你超棒而已！🥰',hasVocab&&hasMath?'背单词又刷题！双管齐下！小宝宝大力表扬！不过不要骄傲！':'今天的努力让小宝宝刮目相看！继续保持，考研成功就在眼前！',hasExercise?'学习又运动，简直完美！小宝宝超级满意！这才是正确的备考姿态！':'满分！！小宝宝决定今天特别夸你！你真的很努力，加油加油！','哇今天内容好丰富！小宝宝觉得你肯定能考上！不过不要骄傲！',hasEarly?'早起还学了这么多！！小宝宝感动到说不出话！继续冲！你是最棒的！':'今天超级棒！小宝宝为你骄傲！才不是很骄傲，只是觉得你很厉害！'],
  };
  const arr=pool[stars],comment=arr[Math.floor(Math.random()*arr.length)];
  const emojis={1:'😤',2:'😑',3:'🙂',4:'😊',5:'🥰'};
  return{stars,emoji:emojis[stars],starStr:'⭐'.repeat(stars)+'☆'.repeat(5-stars),comment};
}

// HISTORY
function renderHistory(){
  const container=document.getElementById('historyList');container.innerHTML='';
  if(!logs.length){container.innerHTML='<div class="empty-state">还没有打卡记录哦～<br>快去写下今天做了什么吧！✏️</div>';return;}
  logs.forEach(log=>{
    const item=document.createElement('div');item.className='history-item';
    item.innerHTML=`<button class="history-delete" onclick="deleteLog(${log.id})">✕</button><div class="history-item-date">📅 ${log.date}</div><div class="history-item-content">${escHtml(log.text)}</div><div class="history-item-rating"><span class="history-stars">${'⭐'.repeat(log.stars||3)}</span><span class="history-comment">${log.emoji||'🐱'} ${escHtml(log.comment||'')}</span></div>`;
    container.appendChild(item);
  });
}
function deleteLog(id){if(!confirm('确定要删除这条记录吗？'))return;logs=logs.filter(l=>l.id!==id);localStorage.setItem('xbb_logs',JSON.stringify(logs));renderHistory();}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

// STATS
function renderStats(){
  const stats=getStats();
  document.getElementById('statsGrid').innerHTML=`<div class="stat-item"><span class="stat-num">${stats.totalLogs}</span><div class="stat-label">打卡天数</div></div><div class="stat-item"><span class="stat-num">${stats.earlyCount}</span><div class="stat-label">早起次数 ☀️</div></div><div class="stat-item"><span class="stat-num">${stats.swimCount}</span><div class="stat-label">游泳次数 🌊</div></div><div class="stat-item"><span class="stat-num">${stats.restCount}</span><div class="stat-label">休息次数 💤</div></div><div class="stat-item"><span class="stat-num">${stats.fiveStarCount}</span><div class="stat-label">五星次数 ⭐</div></div>`;
  const diff=Math.ceil((new Date('2026-12-26')-now)/(1000*60*60*24));
  document.getElementById('countdownNum').textContent=diff>0?diff:'加油！';
}
