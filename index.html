  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 36px 20px 20px;
    position: relative;
  }
  .header-mascot {
    font-size: 56px;
    display: block;
    animation: bobble 3s ease-in-out infinite;
    cursor: pointer;
    user-select: none;
  }
  @keyframes bobble {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  .header-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 28px;
    color: var(--pink-deep);
    margin-top: 8px;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 rgba(242,167,176,0.4);
  }
  .header-sub {
    font-size: 13px;
    color: var(--ink-light);
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .speech-bubble {
    position: relative;
    background: var(--paper);
    border: 2px solid var(--pink);
    border-radius: 16px;
    padding: 10px 18px;
    margin: 12px auto 0;
    max-width: 320px;
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.6;
    box-shadow: 3px 3px 0 var(--pink);
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 10px solid var(--pink);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 9px solid var(--paper);
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 16px 20px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--paper);
    border: 2px solid var(--pink);
    border-radius: 20px;
    padding: 8px 22px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 2px 2px 0 rgba(242,167,176,0.5);
  }
  .tab-btn:hover { transform: translateY(-2px); }
  .tab-btn.active {
    background: var(--pink);
    color: white;
    box-shadow: 3px 3px 0 var(--pink-deep);
  }

  /* ===== PANELS ===== */
  .panel { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ===== CARD BASE ===== */
  .card {
    background: var(--paper);
    border: 2px solid rgba(200,160,100,0.25);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0 var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink), var(--blue), var(--gold));
  }
  .card-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== CALENDAR ===== */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-nav-btn {
    background: none;
    border: 2px solid var(--pink);
    border-radius: 50%;
    width: 32px;

<body>

        placeholder="今天做了什么呀？写给小宝宝看看～
比如：看了两节经济学网课、背了50个考研单词、跑步30分钟..."

      <button class="modal-stamp-btn btn-early" onclick="setStamp('early')">☀️ 早起</button>
      <button class="modal-stamp-btn btn-swim" onclick="setStamp('swim')">🌊 游泳</button>
      <button class="modal-stamp-btn btn-both" onclick="setStamp('both')">☀️+🌊 两个都有！</button>
      <button class="modal-stamp-btn btn-clear" onclick="setStamp('none')">🗑 取消所有章</button>

<script>
// ======== STATE ========
let stamps = JSON.parse(localStorage.getItem('xbb_stamps') || '{}');
let logs = JSON.parse(localStorage.getItem('xbb_logs') || '[]');

// Calendar range: 2026.5 ~ 2027.1
const CAL_START = { year: 2026, month: 5 };
const CAL_END   = { year: 2027, month: 1 };

let currentYear = 2026;
let currentMonth = 5;

// Init to current month if in range
const now = new Date();
const ny = now.getFullYear(), nm = now.getMonth() + 1;
if ((ny > CAL_START.year || (ny === CAL_START.year && nm >= CAL_START.month)) &&
    (ny < CAL_END.year   || (ny === CAL_END.year   && nm <= CAL_END.month))) {
  currentYear = ny; currentMonth = nm;
}

// ======== MASCOT ========
const mascots = ['🐱','🐰','🐻','🦊','🐼','🐨','🐸'];
let mascotIdx = 0;
const speeches = [
  '哼哼，今天的任务完成了吗？小宝宝可是在盯着你的！🔍',
  '你已经打开了这个页面，那就必须好好学习！不然我会嘟嘴的...',
  '考研加油！小宝宝相信你可以的！才怪，你要先给小宝宝看到你努力！',
  '今天早起了吗？游泳了吗？快去盖章！',
  '不要偷懒哦～小宝宝的眼睛很尖的 👀',
  '啊，原来你在这里..都不来打卡，哼！',
  '嘿嘿，小宝宝看到你了，快去学习！',
];
document.getElementById('mascotEmoji').onclick = () => {
  mascotIdx = (mascotIdx+1) % mascots.length;
  document.getElementById('mascotEmoji').textContent = mascots[mascotIdx];
  const s = speeches[Math.floor(Math.random()*speeches.length)];
  document.getElementById('mascotSpeech').textContent = s;
};

// ======== TABS ========
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
  if (name === 'daily') updateLogDate();
}

// ======== CALENDAR ========
function saveStamps() { localStorage.setItem('xbb_stamps', JSON.stringify(stamps)); }

function monthKey(y,m) { return `${y}-${String(m).padStart(2,'0')}`; }
function dayKey(y,m,d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function prevMonth() {
  currentMonth--;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  // clamp
  if (currentYear < CAL_START.year || (currentYear === CAL_START.year && currentMonth < CAL_START.month)) {
    currentYear = CAL_START.year; currentMonth = CAL_START.month;
  }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentYear > CAL_END.year || (currentYear === CAL_END.year && currentMonth > CAL_END.month)) {
    currentYear = CAL_END.year; currentMonth = CAL_END.month;
  }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('monthTitle').textContent = `${currentYear}年${currentMonth}月`;
  const grid = document.getElementById('calGrid');
  // keep headers (first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr = dayKey(now.getFullYear(), now.getMonth()+1, now.getDate());

  // empty cells
  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const key = dayKey(currentYear, currentMonth, d);
    const dow = new Date(currentYear, currentMonth-1, d).getDay();
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (key === todayStr) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    el.className = cls;
    el.innerHTML = `<span class="day-num">${d}</span><div class="stamp-icons"></div>`;

    const stampVal = stamps[key];
    const icons = el.querySelector('.stamp-icons');
    if (stampVal === 'early' || stampVal === 'both') {
      const s = document.createElement('div');
      s.className = 'stamp-early'; s.title = '早起';
      s.textContent = '☀';
      icons.appendChild(s);
    }
    if (stampVal === 'swim' || stampVal === 'both') {
      const s = document.createElement('div');
      s.className = 'stamp-swim'; s.title = '游泳';
      s.textContent = '🌊';
      icons.appendChild(s);
    }

    el.onclick = () => openModal(currentYear, currentMonth, d);
    grid.appendChild(el);
  }
}

// ======== MODAL ========
let modalKey = null;
function openModal(y,m,d) {
  modalKey = dayKey(y,m,d);
  document.getElementById('modalDate').textContent = `${y}年${m}月${d}日`;
  document.getElementById('stampModal').classList.add('show');
}
function closeModal() {
  document.getElementById('stampModal').classList.remove('show');
  modalKey = null;
}
function setStamp(type) {
  if (!modalKey) return;
  if (type === 'none') delete stamps[modalKey];
  else stamps[modalKey] = type;
  saveStamps();
  renderCalendar();
  closeModal();
}
document.getElementById('stampModal').addEventListener('click', e => {
  if (e.target === document.getElementById('stampModal')) closeModal();
});

// ======== DAILY LOG ========
function updateLogDate() {
  const d = new Date();
  document.getElementById('logDateDisplay').textContent =
    `📅 ${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
updateLogDate();

async function submitLog() {
  const text = document.getElementById('logText').value.trim();
  if (!text) { alert('还什么都没写呢！告诉小宝宝今天做了什么～'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '小宝宝在想...';

  const resultBox = document.getElementById('resultBox');
  resultBox.className = 'result-box show';
  document.getElementById('resultMascot').textContent = '';
  document.getElementById('resultStars').textContent = '';
  document.getElementById('resultComment').innerHTML = '<div class="loading-dots"><span>•</span><span>•</span><span>•</span></div>';

  const today = new Date();
  const dateStr = `${today.getFullYear()}.${today.getMonth()+1}.${today.getDate()}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `你是"小宝宝"，一个超级可爱、会撒娇、偶尔嘴硬的AI监督员，正在帮用户备考2027年考研。
你的性格特点：
- 平时说话嗲嗲的、有点傲娇，用"哼"、"嘛"、"啦"、"嗯"等语气词
- 会假装不在乎但其实很关心用户，比如"才不是特别开心呢，只是觉得你今天还不错而已！"
- 遇到用户努力了会夸得很真诚但还要补一句"不过不要骄傲哦！"
- 遇到用户摸鱼了会嘟嘴，但也会温柔鼓励
- 说话简短有趣，不超过80字

你需要对用户今天的学习/生活记录进行评分和点评。
回复格式必须严格如下（JSON格式，不要加任何额外内容）：
{
  "stars": 数字（1到5的整数）,
  "emoji": "一个emoji表情符号（根据评分选择，1星😤，2星😑，3星🙂，4星😊，5星🥰）",
  "comment": "小宝宝的点评（中文，不超过80字，体现小宝宝语气）"
}`,
        messages: [{ role: "user", content: `日期：${dateStr}\n今日记录：${text}` }]
      })
    });

    const data = await response.json();
    let raw = '';
    if (data.content && data.content[0] && data.content[0].text) {
      raw = data.content[0].text.trim();
    }
    // parse JSON
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    const stars = Math.max(1,Math.min(5,parseInt(parsed.stars)||3));
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(5-stars);
    const emoji = parsed.emoji || '🐱';
    const comment = parsed.comment || '小宝宝看了你的记录...嗯嗯，知道了。';

    document.getElementById('resultMascot').textContent = emoji;
    document.getElementById('resultStars').textContent = starStr;
    document.getElementById('resultComment').textContent = comment;

    // save log
    const logEntry = {
      id: Date.now(),
      date: dateStr,
      text: text,
      stars: stars,
      emoji: emoji,
      comment: comment
    };
    logs.unshift(logEntry);
    localStorage.setItem('xbb_logs', JSON.stringify(logs));

  } catch(e) {
    // fallback offline
    const fallbackData = getFallbackRating(text);
    document.getElementById('resultMascot').textContent = fallbackData.emoji;
    document.getElementById('resultStars').textContent = fallbackData.starStr;
    document.getElementById('resultComment').textContent = fallbackData.comment;

    const logEntry = {
      id: Date.now(),
      date: dateStr,
      text: text,
      stars: fallbackData.stars,
      emoji: fallbackData.emoji,
      comment: fallbackData.comment
    };
    logs.unshift(logEntry);
    localStorage.setItem('xbb_logs', JSON.stringify(logs));
  }

  btn.disabled = false;
  btn.textContent = '交给小宝宝评分 📨';
}

function getFallbackRating(text) {
  // simple offline fallback
  const len = text.length;
  let stars = 3;
  if (len > 200) stars = 5;
  else if (len > 100) stars = 4;
  else if (len > 50) stars = 3;
  else if (len > 20) stars = 2;
  else stars = 1;

  const comments = {
    5: ['哇，今天也太努力了吧！小宝宝都被感动了...才没有！只是觉得还不错而已！🥰', '嗯嗯，小宝宝看到了你的努力！继续保持哦，不过不要骄傲！'],
    4: ['今天做得很好嘛，小宝宝满意～但是明天还要更加努力哦！', '嗯，勉勉强强及格了！哼，其实小宝宝觉得你今天还挺棒的～'],
    3: ['就...还行吧，普通普通。小宝宝觉得你还可以做更多！加油！', '嗯嗯，及格线，下次可以多加把劲哦～'],
    2: ['哼，就这？小宝宝有点不满意，明天要更努力！记住了吗！', '...小宝宝觉得今天有点偷懒了呢，嘟嘟嘟，明天改正！'],
    1: ['哼哼！就这点东西！快去学习！小宝宝失望了！😤', '什么？？就这？！？今天怎么了，快去把落下的补回来！']
  };
  const arr = comments[stars];
  const comment = arr[Math.floor(Math.random()*arr.length)];
  const emojis = {1:'😤',2:'😑',3:'🙂',4:'😊',5:'🥰'};
  return { stars, emoji: emojis[stars], starStr: '⭐'.repeat(stars)+'☆'.repeat(5-stars), comment };
}

// ======== HISTORY ========
function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if (!logs.length) {
    container.innerHTML = '<div class="empty-state">还没有打卡记录哦～<br>快去写下今天做了什么吧！✏️</div>';
    return;
  }
  logs.forEach(log => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <button class="history-delete" onclick="deleteLog(${log.id})" title="删除">✕</button>
      <div class="history-item-date">📅 ${log.date}</div>
      <div class="history-item-content">${escHtml(log.text)}</div>
      <div class="history-item-rating">
        <span class="history-stars">${'⭐'.repeat(log.stars||3)}</span>
        <span class="history-comment">${log.emoji||'🐱'} ${escHtml(log.comment||'')}</span>
      </div>
    `;
    container.appendChild(item);
  });
}
function deleteLog(id) {
  if (!confirm('确定要删除这条记录吗？')) return;
  logs = logs.filter(l => l.id !== id);
  localStorage.setItem('xbb_logs', JSON.stringify(logs));
  renderHistory();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ======== STATS ========
function renderStats() {
  // stamps stats
  let earlyCount=0, swimCount=0, bothCount=0;
  Object.values(stamps).forEach(v => {
    if(v==='early') earlyCount++;
    else if(v==='swim') swimCount++;
    else if(v==='both') { earlyCount++; swimCount++; bothCount++; }
  });

  // logs stats
  const totalLogs = logs.length;
  let totalStars = 0;
  logs.forEach(l => totalStars += (l.stars||3));
  const avgStars = totalLogs ? (totalStars/totalLogs).toFixed(1) : '--';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-item"><span class="stat-num">${totalLogs}</span><div class="stat-label">打卡天数</div></div>
    <div class="stat-item"><span class="stat-num">${earlyCount}</span><div class="stat-label">早起次数 ☀️</div></div>
    <div class="stat-item"><span class="stat-num">${swimCount}</span><div class="stat-label">游泳次数 🌊</div></div>
    <div class="stat-item"><span class="stat-num">${avgStars}</span><div class="stat-label">平均评分 ⭐</div></div>
  `;

  // countdown to 考研 (estimated 2026.12.26)
  const examDate = new Date('2026-12-26');
  const diff = Math.ceil((examDate - now)/(1000*60*60*24));
  document.getElementById('countdownNum').textContent = diff > 0 ? diff : '已到考研！';
}
