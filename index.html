<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小宝宝的监督日记 📋</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap');

  :root {
    --cream: #fdf6ec;
    --warm: #f5ede0;
    --pink: #f2a7b0;
    --pink-deep: #e07a86;
    --blue: #89b4d4;
    --blue-deep: #4a87b3;
    --gold: #e8c56a;
    --gold-deep: #c9a030;
    --ink: #3a2a1e;
    --ink-light: #7a5c48;
    --paper: #fefaf4;
    --shadow: rgba(80,40,20,0.12);
    --red-stamp: #c0392b;
    --blue-stamp: #2471a3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(242,167,176,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(137,180,212,0.18) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a030' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 36px 20px 20px;
    position: relative;
  }
  .header-mascot {
    font-size: 56px;
    display: block;
    animation: bobble 3s ease-in-out infinite;
    cursor: pointer;
    user-select: none;
  }
  @keyframes bobble {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  .header-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 28px;
    color: var(--pink-deep);
    margin-top: 8px;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 rgba(242,167,176,0.4);
  }
  .header-sub {
    font-size: 13px;
    color: var(--ink-light);
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .speech-bubble {
    position: relative;
    background: var(--paper);
    border: 2px solid var(--pink);
    border-radius: 16px;
    padding: 10px 18px;
    margin: 12px auto 0;
    max-width: 320px;
    font-size: 14px;
    color: var(--ink-light);
    line-height: 1.6;
    box-shadow: 3px 3px 0 var(--pink);
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 10px solid var(--pink);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -7px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 9px solid var(--paper);
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 16px 20px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--paper);
    border: 2px solid var(--pink);
    border-radius: 20px;
    padding: 8px 22px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 2px 2px 0 rgba(242,167,176,0.5);
  }
  .tab-btn:hover { transform: translateY(-2px); }
  .tab-btn.active {
    background: var(--pink);
    color: white;
    box-shadow: 3px 3px 0 var(--pink-deep);
  }

  /* ===== PANELS ===== */
  .panel { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ===== CARD BASE ===== */
  .card {
    background: var(--paper);
    border: 2px solid rgba(200,160,100,0.25);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0 var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink), var(--blue), var(--gold));
  }
  .card-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== CALENDAR ===== */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-nav-btn {
    background: none;
    border: 2px solid var(--pink);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 16px;
    cursor: pointer;
    color: var(--pink-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .month-nav-btn:hover { background: var(--pink); color: white; transform: scale(1.1); }
  .month-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: 3px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-header {
    text-align: center;
    font-size: 12px;
    color: var(--ink-light);
    padding: 4px 0;
    font-weight: 600;
  }
  .cal-header:first-child { color: var(--pink-deep); }
  .cal-header:last-child { color: var(--blue-deep); }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    border: 1.5px solid transparent;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    min-height: 42px;
    background: rgba(255,255,255,0.6);
    font-size: 13px;
  }
  .cal-day:hover { border-color: var(--pink); background: rgba(242,167,176,0.12); transform: scale(1.05); }
  .cal-day.empty { cursor: default; background: none; }
  .cal-day.today { border-color: var(--gold-deep); background: rgba(232,197,106,0.15); font-weight: 700; }
  .cal-day.today .day-num { color: var(--gold-deep); }
  .cal-day.sunday .day-num { color: var(--pink-deep); }
  .cal-day.saturday .day-num { color: var(--blue-deep); }

  .day-num { font-size: 13px; line-height: 1; }

  .stamp-icons {
    display: flex;
    gap: 2px;
    margin-top: 2px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stamp-early {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--red-stamp);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: white;
    border: 1.5px solid rgba(0,0,0,0.15);
    box-shadow: 0 1px 3px rgba(192,57,43,0.4);
    flex-shrink: 0;
  }
  .stamp-swim {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--blue-stamp);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: white;
    border: 1.5px solid rgba(0,0,0,0.15);
    box-shadow: 0 1px 3px rgba(36,113,163,0.4);
    flex-shrink: 0;
  }

  /* stamp legend */
  .stamp-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-light);
  }
  .legend-dot-red {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--red-stamp);
    border: 2px solid rgba(0,0,0,0.1);
    box-shadow: 0 1px 4px rgba(192,57,43,0.4);
    display: flex;align-items:center;justify-content:center;
    font-size:10px;color:white;
  }
  .legend-dot-blue {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--blue-stamp);
    border: 2px solid rgba(0,0,0,0.1);
    box-shadow: 0 1px 4px rgba(36,113,163,0.4);
    display: flex;align-items:center;justify-content:center;
    font-size:10px;color:white;
  }

  /* ===== STAMP MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60,30,20,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--paper);
    border: 3px solid var(--pink);
    border-radius: 20px;
    padding: 28px;
    max-width: 300px;
    width: 90%;
    box-shadow: 6px 6px 0 var(--pink-deep);
    text-align: center;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-date {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .modal-hint { font-size: 13px; color: var(--ink-light); margin-bottom: 20px; }
  .modal-btns { display: flex; flex-direction: column; gap: 10px; }
  .modal-stamp-btn {
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .modal-stamp-btn:hover { transform: translateY(-2px) scale(1.03); }
  .btn-early { background: rgba(192,57,43,0.12); color: var(--red-stamp); border: 2px solid var(--red-stamp); }
  .btn-swim { background: rgba(36,113,163,0.12); color: var(--blue-stamp); border: 2px solid var(--blue-stamp); }
  .btn-both { background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(36,113,163,0.1)); color: var(--ink); border: 2px solid var(--ink-light); }
  .btn-clear { background: rgba(120,90,70,0.08); color: var(--ink-light); border: 2px dashed var(--ink-light); font-size: 13px; }
  .btn-close { background: none; border: none; color: var(--ink-light); font-size: 13px; cursor: pointer; margin-top: 4px; text-decoration: underline; }

  /* ===== DAILY LOG ===== */
  .log-form { display: flex; flex-direction: column; gap: 14px; }
  .log-date-display {
    font-size: 14px;
    color: var(--ink-light);
    font-style: italic;
  }
  .log-textarea {
    width: 100%;
    min-height: 120px;
    border: 2px solid rgba(200,160,100,0.4);
    border-radius: 12px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    background: rgba(255,255,255,0.7);
    resize: vertical;
    line-height: 1.7;
    transition: border 0.2s;
    outline: none;
  }
  .log-textarea:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(242,167,176,0.2); }
  .log-textarea::placeholder { color: rgba(120,90,70,0.45); }

  .submit-btn {
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 3px 3px 0 var(--pink-deep);
    transition: all 0.2s;
    align-self: flex-end;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 var(--pink-deep); }
  .submit-btn:active { transform: translateY(0); box-shadow: 2px 2px 0 var(--pink-deep); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ===== RATING RESULT ===== */
  .result-box {
    display: none;
    margin-top: 16px;
    background: linear-gradient(135deg, rgba(242,167,176,0.15), rgba(137,180,212,0.15));
    border: 2px solid var(--pink);
    border-radius: 16px;
    padding: 20px;
    animation: fadeSlideUp 0.4s ease;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-box.show { display: block; }
  .result-mascot { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .result-stars {
    text-align: center;
    font-size: 28px;
    margin-bottom: 10px;
    letter-spacing: 3px;
  }
  .result-comment {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.8;
    text-align: center;
  }
  .loading-dots {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    color: var(--ink-light);
  }
  .loading-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    font-size: 20px;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* ===== LOG HISTORY ===== */
  .history-list { display: flex; flex-direction: column; gap: 12px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
  .history-list::-webkit-scrollbar { width: 6px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(242,167,176,0.5); border-radius: 3px; }

  .history-item {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(200,160,100,0.25);
    border-radius: 12px;
    padding: 14px;
    position: relative;
  }
  .history-item-date {
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .history-item-content { font-size: 14px; color: var(--ink); line-height: 1.6; margin-bottom: 8px; }
  .history-item-rating { font-size: 13px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .history-stars { font-size: 16px; letter-spacing: 2px; }
  .history-comment { font-size: 13px; color: var(--ink-light); font-style: italic; }
  .history-delete {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    color: rgba(180,100,100,0.5);
    transition: color 0.2s;
  }
  .history-delete:hover { color: var(--pink-deep); }

  /* ===== STATS ===== */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
  .stat-item {
    background: rgba(255,255,255,0.6);
    border: 1.5px solid rgba(200,160,100,0.2);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 32px;
    color: var(--pink-deep);
    display: block;
  }
  .stat-label { font-size: 12px; color: var(--ink-light); margin-top: 4px; }

  .empty-state { text-align: center; color: var(--ink-light); font-size: 14px; padding: 30px; line-height: 2; }

  /* ===== PROGRESS RING ===== */
  .progress-section { margin-top: 20px; }
  .exam-countdown {
    text-align: center;
    background: linear-gradient(135deg, rgba(242,167,176,0.2), rgba(232,197,106,0.2));
    border: 2px dashed var(--gold-deep);
    border-radius: 14px;
    padding: 18px;
  }
  .countdown-num {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 48px;
    color: var(--gold-deep);
    display: block;
    line-height: 1;
  }
  .countdown-label { font-size: 14px; color: var(--ink-light); margin-top: 4px; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 30px 20px;
    font-size: 12px;
    color: rgba(122,92,72,0.5);
    letter-spacing: 2px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .cal-day { min-height: 36px; font-size: 12px; }
    .stamp-early, .stamp-swim { width: 11px; height: 11px; font-size: 6px; }
    .card { padding: 16px; }
    .header-title { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-mascot" id="mascotEmoji" title="点我！">🐱</span>
  <div class="header-title">小宝宝的监督日记</div>
  <div class="header-sub">考研倒计时 · 打卡记录 · 每日总结</div>
  <div class="speech-bubble" id="mascotSpeech">哼哼，今天的任务完成了吗？小宝宝可是在盯着你的！🔍</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('calendar')">📅 打卡日历</button>
  <button class="tab-btn" onclick="switchTab('daily')">✏️ 每日打卡</button>
  <button class="tab-btn" onclick="switchTab('history')">📖 打卡历史</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 学习统计</button>
</div>

<!-- ===== CALENDAR PANEL ===== -->
<div class="panel active" id="panel-calendar">
  <div class="card">
    <div class="card-title">🗓️ 习惯打卡日历</div>
    <div class="stamp-legend">
      <div class="legend-item">
        <div class="legend-dot-red">☀</div>
        <span>早起</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot-blue">🌊</div>
        <span>游泳</span>
      </div>
      <span style="font-size:12px;color:var(--ink-light);margin-left:auto;">点击日期盖章 ↓</span>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" onclick="prevMonth()">‹</button>
      <div class="month-title" id="monthTitle">2026年5月</div>
      <button class="month-nav-btn" onclick="nextMonth()">›</button>
    </div>

    <div class="cal-grid" id="calGrid">
      <div class="cal-header">日</div>
      <div class="cal-header">一</div>
      <div class="cal-header">二</div>
      <div class="cal-header">三</div>
      <div class="cal-header">四</div>
      <div class="cal-header">五</div>
      <div class="cal-header">六</div>
    </div>
  </div>
</div>

<!-- ===== DAILY PANEL ===== -->
<div class="panel" id="panel-daily">
  <div class="card">
    <div class="card-title">✏️ 今日打卡</div>
    <div class="log-form">
      <div class="log-date-display" id="logDateDisplay"></div>
      <textarea
        class="log-textarea"
        id="logText"
        placeholder="今天做了什么呀？写给小宝宝看看～
比如：看了两节经济学网课、背了50个考研单词、跑步30分钟..."
      ></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitLog()">交给小宝宝评分 📨</button>
    </div>
    <div class="result-box" id="resultBox">
      <div class="result-mascot" id="resultMascot"></div>
      <div class="result-stars" id="resultStars"></div>
      <div class="result-comment" id="resultComment"></div>
    </div>
  </div>
</div>

<!-- ===== HISTORY PANEL ===== -->
<div class="panel" id="panel-history">
  <div class="card">
    <div class="card-title">📖 历史记录</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- ===== STATS PANEL ===== -->
<div class="panel" id="panel-stats">
  <div class="card">
    <div class="card-title">📊 学习统计</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="progress-section">
      <div class="exam-countdown" id="examCountdown">
        <span class="countdown-num" id="countdownNum">--</span>
        <div class="countdown-label">距离2027年考研还有（天）</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== STAMP MODAL ===== -->
<div class="modal-overlay" id="stampModal">
  <div class="modal-box">
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-hint">选择今天要盖的章 🖊</div>
    <div class="modal-btns">
      <button class="modal-stamp-btn btn-early" onclick="setStamp('early')">☀️ 早起</button>
      <button class="modal-stamp-btn btn-swim" onclick="setStamp('swim')">🌊 游泳</button>
      <button class="modal-stamp-btn btn-both" onclick="setStamp('both')">☀️+🌊 两个都有！</button>
      <button class="modal-stamp-btn btn-clear" onclick="setStamp('none')">🗑 取消所有章</button>
      <button class="btn-close" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<div class="footer">小宝宝的监督日记 · 数据存于本地 · 加油考研！📚</div>

<script>
// ======== STATE ========
let stamps = JSON.parse(localStorage.getItem('xbb_stamps') || '{}');
let logs = JSON.parse(localStorage.getItem('xbb_logs') || '[]');

// Calendar range: 2026.5 ~ 2027.1
const CAL_START = { year: 2026, month: 5 };
const CAL_END   = { year: 2027, month: 1 };

let currentYear = 2026;
let currentMonth = 5;

// Init to current month if in range
const now = new Date();
const ny = now.getFullYear(), nm = now.getMonth() + 1;
if ((ny > CAL_START.year || (ny === CAL_START.year && nm >= CAL_START.month)) &&
    (ny < CAL_END.year   || (ny === CAL_END.year   && nm <= CAL_END.month))) {
  currentYear = ny; currentMonth = nm;
}

// ======== MASCOT ========
const mascots = ['🐱','🐰','🐻','🦊','🐼','🐨','🐸'];
let mascotIdx = 0;
const speeches = [
  '哼哼，今天的任务完成了吗？小宝宝可是在盯着你的！🔍',
  '你已经打开了这个页面，那就必须好好学习！不然我会嘟嘴的...',
  '考研加油！小宝宝相信你可以的！才怪，你要先给小宝宝看到你努力！',
  '今天早起了吗？游泳了吗？快去盖章！',
  '不要偷懒哦～小宝宝的眼睛很尖的 👀',
  '啊，原来你在这里..都不来打卡，哼！',
  '嘿嘿，小宝宝看到你了，快去学习！',
];
document.getElementById('mascotEmoji').onclick = () => {
  mascotIdx = (mascotIdx+1) % mascots.length;
  document.getElementById('mascotEmoji').textContent = mascots[mascotIdx];
  const s = speeches[Math.floor(Math.random()*speeches.length)];
  document.getElementById('mascotSpeech').textContent = s;
};

// ======== TABS ========
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats') renderStats();
  if (name === 'daily') updateLogDate();
}

// ======== CALENDAR ========
function saveStamps() { localStorage.setItem('xbb_stamps', JSON.stringify(stamps)); }

function monthKey(y,m) { return `${y}-${String(m).padStart(2,'0')}`; }
function dayKey(y,m,d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function prevMonth() {
  currentMonth--;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  // clamp
  if (currentYear < CAL_START.year || (currentYear === CAL_START.year && currentMonth < CAL_START.month)) {
    currentYear = CAL_START.year; currentMonth = CAL_START.month;
  }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentYear > CAL_END.year || (currentYear === CAL_END.year && currentMonth > CAL_END.month)) {
    currentYear = CAL_END.year; currentMonth = CAL_END.month;
  }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('monthTitle').textContent = `${currentYear}年${currentMonth}月`;
  const grid = document.getElementById('calGrid');
  // keep headers (first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr = dayKey(now.getFullYear(), now.getMonth()+1, now.getDate());

  // empty cells
  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const key = dayKey(currentYear, currentMonth, d);
    const dow = new Date(currentYear, currentMonth-1, d).getDay();
    const el = document.createElement('div');
    let cls = 'cal-day';
    if (key === todayStr) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    el.className = cls;
    el.innerHTML = `<span class="day-num">${d}</span><div class="stamp-icons"></div>`;

    const stampVal = stamps[key];
    const icons = el.querySelector('.stamp-icons');
    if (stampVal === 'early' || stampVal === 'both') {
      const s = document.createElement('div');
      s.className = 'stamp-early'; s.title = '早起';
      s.textContent = '☀';
      icons.appendChild(s);
    }
    if (stampVal === 'swim' || stampVal === 'both') {
      const s = document.createElement('div');
      s.className = 'stamp-swim'; s.title = '游泳';
      s.textContent = '🌊';
      icons.appendChild(s);
    }

    el.onclick = () => openModal(currentYear, currentMonth, d);
    grid.appendChild(el);
  }
}

// ======== MODAL ========
let modalKey = null;
function openModal(y,m,d) {
  modalKey = dayKey(y,m,d);
  document.getElementById('modalDate').textContent = `${y}年${m}月${d}日`;
  document.getElementById('stampModal').classList.add('show');
}
function closeModal() {
  document.getElementById('stampModal').classList.remove('show');
  modalKey = null;
}
function setStamp(type) {
  if (!modalKey) return;
  if (type === 'none') delete stamps[modalKey];
  else stamps[modalKey] = type;
  saveStamps();
  renderCalendar();
  closeModal();
}
document.getElementById('stampModal').addEventListener('click', e => {
  if (e.target === document.getElementById('stampModal')) closeModal();
});

// ======== DAILY LOG ========
function updateLogDate() {
  const d = new Date();
  document.getElementById('logDateDisplay').textContent =
    `📅 ${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
updateLogDate();

async function submitLog() {
  const text = document.getElementById('logText').value.trim();
  if (!text) { alert('还什么都没写呢！告诉小宝宝今天做了什么～'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '小宝宝在想...';

  const resultBox = document.getElementById('resultBox');
  resultBox.className = 'result-box show';
  document.getElementById('resultMascot').textContent = '';
  document.getElementById('resultStars').textContent = '';
  document.getElementById('resultComment').innerHTML = '<div class="loading-dots"><span>•</span><span>•</span><span>•</span></div>';

  const today = new Date();
  const dateStr = `${today.getFullYear()}.${today.getMonth()+1}.${today.getDate()}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `你是"小宝宝"，一个超级可爱、会撒娇、偶尔嘴硬的AI监督员，正在帮用户备考2027年考研。
你的性格特点：
- 平时说话嗲嗲的、有点傲娇，用"哼"、"嘛"、"啦"、"嗯"等语气词
- 会假装不在乎但其实很关心用户，比如"才不是特别开心呢，只是觉得你今天还不错而已！"
- 遇到用户努力了会夸得很真诚但还要补一句"不过不要骄傲哦！"
- 遇到用户摸鱼了会嘟嘴，但也会温柔鼓励
- 说话简短有趣，不超过80字

你需要对用户今天的学习/生活记录进行评分和点评。
回复格式必须严格如下（JSON格式，不要加任何额外内容）：
{
  "stars": 数字（1到5的整数）,
  "emoji": "一个emoji表情符号（根据评分选择，1星😤，2星😑，3星🙂，4星😊，5星🥰）",
  "comment": "小宝宝的点评（中文，不超过80字，体现小宝宝语气）"
}`,
        messages: [{ role: "user", content: `日期：${dateStr}\n今日记录：${text}` }]
      })
    });

    const data = await response.json();
    let raw = '';
    if (data.content && data.content[0] && data.content[0].text) {
      raw = data.content[0].text.trim();
    }
    // parse JSON
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    const stars = Math.max(1,Math.min(5,parseInt(parsed.stars)||3));
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(5-stars);
    const emoji = parsed.emoji || '🐱';
    const comment = parsed.comment || '小宝宝看了你的记录...嗯嗯，知道了。';

    document.getElementById('resultMascot').textContent = emoji;
    document.getElementById('resultStars').textContent = starStr;
    document.getElementById('resultComment').textContent = comment;

    // save log
    const logEntry = {
      id: Date.now(),
      date: dateStr,
      text: text,
      stars: stars,
      emoji: emoji,
      comment: comment
    };
    logs.unshift(logEntry);
    localStorage.setItem('xbb_logs', JSON.stringify(logs));

  } catch(e) {
    // fallback offline
    const fallbackData = getFallbackRating(text);
    document.getElementById('resultMascot').textContent = fallbackData.emoji;
    document.getElementById('resultStars').textContent = fallbackData.starStr;
    document.getElementById('resultComment').textContent = fallbackData.comment;

    const logEntry = {
      id: Date.now(),
      date: dateStr,
      text: text,
      stars: fallbackData.stars,
      emoji: fallbackData.emoji,
      comment: fallbackData.comment
    };
    logs.unshift(logEntry);
    localStorage.setItem('xbb_logs', JSON.stringify(logs));
  }

  btn.disabled = false;
  btn.textContent = '交给小宝宝评分 📨';
}

function getFallbackRating(text) {
  // simple offline fallback
  const len = text.length;
  let stars = 3;
  if (len > 200) stars = 5;
  else if (len > 100) stars = 4;
  else if (len > 50) stars = 3;
  else if (len > 20) stars = 2;
  else stars = 1;

  const comments = {
    5: ['哇，今天也太努力了吧！小宝宝都被感动了...才没有！只是觉得还不错而已！🥰', '嗯嗯，小宝宝看到了你的努力！继续保持哦，不过不要骄傲！'],
    4: ['今天做得很好嘛，小宝宝满意～但是明天还要更加努力哦！', '嗯，勉勉强强及格了！哼，其实小宝宝觉得你今天还挺棒的～'],
    3: ['就...还行吧，普通普通。小宝宝觉得你还可以做更多！加油！', '嗯嗯，及格线，下次可以多加把劲哦～'],
    2: ['哼，就这？小宝宝有点不满意，明天要更努力！记住了吗！', '...小宝宝觉得今天有点偷懒了呢，嘟嘟嘟，明天改正！'],
    1: ['哼哼！就这点东西！快去学习！小宝宝失望了！😤', '什么？？就这？！？今天怎么了，快去把落下的补回来！']
  };
  const arr = comments[stars];
  const comment = arr[Math.floor(Math.random()*arr.length)];
  const emojis = {1:'😤',2:'😑',3:'🙂',4:'😊',5:'🥰'};
  return { stars, emoji: emojis[stars], starStr: '⭐'.repeat(stars)+'☆'.repeat(5-stars), comment };
}

// ======== HISTORY ========
function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if (!logs.length) {
    container.innerHTML = '<div class="empty-state">还没有打卡记录哦～<br>快去写下今天做了什么吧！✏️</div>';
    return;
  }
  logs.forEach(log => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <button class="history-delete" onclick="deleteLog(${log.id})" title="删除">✕</button>
      <div class="history-item-date">📅 ${log.date}</div>
      <div class="history-item-content">${escHtml(log.text)}</div>
      <div class="history-item-rating">
        <span class="history-stars">${'⭐'.repeat(log.stars||3)}</span>
        <span class="history-comment">${log.emoji||'🐱'} ${escHtml(log.comment||'')}</span>
      </div>
    `;
    container.appendChild(item);
  });
}
function deleteLog(id) {
  if (!confirm('确定要删除这条记录吗？')) return;
  logs = logs.filter(l => l.id !== id);
  localStorage.setItem('xbb_logs', JSON.stringify(logs));
  renderHistory();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ======== STATS ========
function renderStats() {
  // stamps stats
  let earlyCount=0, swimCount=0, bothCount=0;
  Object.values(stamps).forEach(v => {
    if(v==='early') earlyCount++;
    else if(v==='swim') swimCount++;
    else if(v==='
